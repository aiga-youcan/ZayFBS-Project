<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZayFBS - Produits & Panier</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">ZayFBS</a>
        <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="produits.html" class="active">Produits</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li>
                <a href="#panier" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cart-counter">0</span>
                </a>
            </li>
        </ul>
    </nav>

    <section class="section">
        <h2 class="section-title">Nos Produits</h2>
        
        <div style="text-align: center; margin-bottom: 3rem;">
            <button id="toggle-form-btn" class="btn btn-outline"><i class="fas fa-plus"></i> Ajouter un produit</button>
        </div>

        <div class="form-container" id="product-form-container" style="display: none;">
            <h3 id="form-title" style="margin-bottom: 1rem; color: var(--primary);">Nouveau Produit</h3>
            <form id="product-form">
                <input type="hidden" id="prod-id">
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="url" id="prod-img" required placeholder="https://exemple.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>Titre</label>
                    <input type="text" id="prod-title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="prod-desc" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Prix (MAD)</label>
                    <input type="number" id="prod-price" min="1" step="0.5" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn">Sauvegarder</button>
                    <button type="button" id="cancel-btn" class="btn btn-danger">Annuler</button>
                </div>
            </form>
        </div>

        <div class="grid" id="products-grid"></div>
    </section>


<!-- Add this inside <body> -->
<div id="cart-sidebar" class="cart-sidebar">

  <div class="cart-header">
    <h2>Panier</h2>
    <button onclick="closeCart()">✖</button>
  </div>

  <div class="cart-body">
    <table class="cart-table">
      <tbody id="cart-body"></tbody>
    </table>
  </div>

  <div class="cart-footer">
    <strong>Total</strong>
    <span id="cart-total">0</span> MAD
  </div>

</div>


    <footer>
        <div class="footer-content">
            <div>
                <h3>ZayFBS</h3>
                <p>Région : Fquih Ben Saleh</p>
            </div>
            <div>
                <h3>Contact</h3>
                <p><i class="fas fa-phone"></i> +212 6 00 00 00 00</p>
                <p><i class="fas fa-envelope"></i> contact@zayfbs.ma</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 ZayFBS — Tous droits réservés</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
