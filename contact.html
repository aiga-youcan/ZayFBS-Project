<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZayFBS - Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar">
        <a href="index.html" class="logo">ZayFBS</a>
        <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Accueil</a></li>
            <li><a href="produits.html">Produits</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li>
                <a href="javascript:void(0)" class="cart-icon" onclick="openCart()">
    <i class="fas fa-shopping-cart"></i>
    <span class="cart-count" id="cart-counter">0</span>
</a>
                </a>
            </li>
        </ul>
    </nav>

    <section class="section">
        <h2 class="section-title">Contactez-nous</h2>

        <div class="form-container">
            <div id="success-msg"
                style="display:none; background: var(--secondary); color: white; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; text-align: center; font-weight: bold;">
                Votre message a été envoyé avec succès !
            </div>

            <form id="contact-form">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="contact-name" required minlength="3" placeholder="Votre nom">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="contact-email" required placeholder="votre.email@exemple.com">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="contact-message" rows="6" required minlength="10"
                        placeholder="Comment pouvons-nous vous aider ?"></textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn"><i class="fas fa-paper-plane"></i> Envoyer</button>
                    <button type="reset" class="btn btn-danger"><i class="fas fa-undo"></i> Réinitialiser</button>
                </div>
            </form>
        </div>
    </section>




<!-- 🛒 CART SIDEBAR -->
<div id="cart-sidebar" class="cart-sidebar">

  <div class="cart-header">
    <h2>Votre Panier</h2>
    <button onclick="closeCart()">✖</button>
  </div>

  <table class="cart-table">
    <tbody id="cart-body"></tbody>
  </table>

  <h3>Total: <span id="cart-total">0</span> MAD</h3>

</div>



    <footer>
        <div class="footer-content">
            <div>
                <h3>ZayFBS</h3>
                <p>Région : Fquih Ben Saleh</p>
            </div>
            <div>
                <h3>Contact</h3>
                <p><i class="fas fa-phone"></i> +212 6 00 00 00 00</p>
                <p><i class="fas fa-envelope"></i> contact@zayfbs.ma</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 ZayFBS — Tous droits réservés</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
